<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 90" width="360" height="90">
  <defs>
    <linearGradient id="flame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#d63031"/>
      <stop offset="40%" style="stop-color:#e94560"/>
      <stop offset="75%" style="stop-color:#f39c12"/>
      <stop offset="100%" style="stop-color:#fdcb6e"/>
    </linearGradient>
    <linearGradient id="innerFlame" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f39c12"/>
      <stop offset="100%" style="stop-color:#ffeaa7"/>
    </linearGradient>
  </defs>

  <!-- Flame icon — refined shape -->
  <g transform="translate(10, 6)">
    <!-- Outer flame -->
    <path d="M30 72 C30 72, 6 52, 6 34 C6 20, 14 8, 26 2 C22 14, 28 20, 34 16 C38 12, 42 6, 46 2 C58 14, 62 28, 56 42 C52 50, 46 56, 44 58 C48 50, 50 40, 48 32 C46 24, 40 20, 38 24 C34 30, 38 42, 36 52 C34 62, 30 72, 30 72Z" fill="url(#flame)"/>
    <!-- Inner flame -->
    <path d="M30 72 C30 72, 16 56, 16 44 C16 34, 22 26, 30 22 C28 30, 32 36, 36 32 C38 28, 40 24, 40 30 C42 38, 44 44, 40 54 C38 62, 30 72, 30 72Z" fill="url(#innerFlame)" opacity="0.85"/>
    <!-- Bright core -->
    <ellipse cx="31" cy="58" rx="6" ry="10" fill="#ffeaa7" opacity="0.5"/>
  </g>

  <!-- Text: readme-roast -->
  <text x="78" y="52" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace" font-size="30" font-weight="800" letter-spacing="-0.8">
    <tspan fill="#1a1a2e">readme</tspan><tspan fill="#636e72">-</tspan><tspan fill="#e94560">roast</tspan>
  </text>

  <!-- Tagline -->
  <text x="80" y="72" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="#636e72" letter-spacing="2.5" text-transform="uppercase">STAR CONVERSION AUDIT</text>
</svg>
